<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VISA_CTRL // AUTHENTICATE</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --green: #00ff41;
        --magenta: #ff00ff;
        --cyan: #00ffff;
        --red: #ff0044;
        --bg: #000;
        --surface: #050505;
        --dim: #1a1a1a;
        --text: #888;
      }

      body {
        background: var(--bg);
        color: var(--green);
        font-family: 'Share Tech Mono', monospace;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* Scanlines */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0,0,0,0.18) 2px,
          rgba(0,0,0,0.18) 4px
        );
        pointer-events: none;
        z-index: 999;
      }

      /* Vignette */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.8) 100%);
        pointer-events: none;
        z-index: 998;
      }

      .terminal {
        width: min(520px, 95vw);
        border: 1px solid var(--green);
        background: var(--surface);
        box-shadow:
          0 0 0 1px #000,
          0 0 20px rgba(0,255,65,0.25),
          0 0 60px rgba(0,255,65,0.08),
          inset 0 0 20px rgba(0,255,65,0.04);
        padding: 40px;
        position: relative;
      }

      /* Corner accents */
      .terminal::before,
      .terminal::after {
        content: '';
        position: absolute;
        width: 12px;
        height: 12px;
        border-color: var(--cyan);
        border-style: solid;
      }
      .terminal::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
      .terminal::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

      .title {
        font-size: clamp(1.4rem, 5vw, 2rem);
        letter-spacing: 6px;
        text-align: center;
        margin-bottom: 4px;
        position: relative;
        color: var(--green);
        text-shadow: 0 0 10px rgba(0,255,65,0.6);
        animation: glitch 4s infinite;
      }

      @keyframes glitch {
        0%,72%,76%,78%,100% {
          text-shadow: 0 0 10px rgba(0,255,65,0.6),
                       0.05em 0 0 var(--magenta),
                      -0.025em -0.05em 0 var(--cyan);
        }
        73% { text-shadow: -0.05em -0.025em 0 var(--magenta), 0.025em 0.05em 0 var(--cyan); transform: translate(-2px, 1px); }
        75% { text-shadow:  0.05em  0.025em 0 var(--magenta), 0.025em 0.05em 0 var(--cyan); transform: translate(2px, -1px); }
        77% { text-shadow:  0.025em 0.05em 0 var(--magenta), -0.05em -0.025em 0 var(--cyan); transform: translate(0); }
      }

      .subtitle {
        text-align: center;
        color: var(--text);
        font-size: 0.7rem;
        letter-spacing: 3px;
        margin-bottom: 36px;
      }

      .divider {
        border: none;
        border-top: 1px solid var(--dim);
        margin: 20px 0;
      }

      .sys-line {
        color: var(--text);
        font-size: 0.75rem;
        letter-spacing: 1px;
        margin-bottom: 8px;
      }

      .sys-line span { color: var(--cyan); }

      .error-box {
        margin: 16px 0;
        padding: 12px 16px;
        border: 1px solid var(--red);
        color: var(--red);
        font-size: 0.8rem;
        letter-spacing: 2px;
        background: rgba(255,0,68,0.06);
        animation: flicker 0.3s ease;
        box-shadow: 0 0 12px rgba(255,0,68,0.2);
      }

      @keyframes flicker {
        0%,100% { opacity: 1; }
        50% { opacity: 0.6; }
      }

      .input-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 24px 0 8px;
      }

      .prompt-sym {
        color: var(--green);
        font-size: 1.1rem;
        flex-shrink: 0;
      }

      .input-label {
        color: var(--text);
        font-size: 0.8rem;
        letter-spacing: 2px;
        flex-shrink: 0;
        white-space: nowrap;
      }

      input[type="password"] {
        flex: 1;
        background: transparent;
        border: none;
        border-bottom: 1px solid var(--green);
        color: var(--green);
        font-family: 'Share Tech Mono', monospace;
        font-size: 1rem;
        padding: 4px 8px;
        outline: none;
        letter-spacing: 4px;
        caret-color: var(--green);
      }

      input[type="password"]:focus {
        border-bottom-color: var(--cyan);
        box-shadow: 0 2px 8px rgba(0,255,255,0.15);
      }

      .cursor {
        display: inline-block;
        width: 8px;
        height: 1.1em;
        background: var(--green);
        vertical-align: middle;
        margin-left: 2px;
        animation: blink 1s step-end infinite;
      }

      @keyframes blink {
        0%,100% { opacity: 1; }
        50%      { opacity: 0; }
      }

      .btn-row {
        margin-top: 30px;
        display: flex;
        justify-content: flex-end;
      }

      button[type="submit"] {
        background: transparent;
        border: 1px solid var(--green);
        color: var(--green);
        font-family: 'Share Tech Mono', monospace;
        font-size: 0.85rem;
        letter-spacing: 3px;
        padding: 10px 28px;
        cursor: pointer;
        text-transform: uppercase;
        transition: all 0.15s;
        position: relative;
        overflow: hidden;
      }

      button[type="submit"]::before {
        content: '';
        position: absolute;
        inset: 0;
        background: var(--green);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.15s;
        z-index: -1;
      }

      button[type="submit"]:hover {
        color: #000;
        box-shadow: 0 0 24px rgba(0,255,65,0.5);
      }
      button[type="submit"]:hover::before { transform: scaleX(1); }

      .footer-text {
        margin-top: 24px;
        color: #2a2a2a;
        font-size: 0.65rem;
        letter-spacing: 2px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="terminal">
      <h1 class="title">VISA_CTRL</h1>
      <p class="subtitle">// APPOINTMENT MONITOR — SECURE TERMINAL //</p>
      <hr class="divider" />

      <p class="sys-line">&gt; SYS: <span>AUTHENTICATION REQUIRED</span></p>
      <p class="sys-line">&gt; STATUS: <span>LOCKED</span></p>

      {% if error %}
      <div class="error-box">⚠ {{ error }}</div>
      {% endif %}

      <form method="POST" autocomplete="off">
        <div class="input-row">
          <span class="prompt-sym">&gt;</span>
          <span class="input-label">PASSPHRASE:</span>
          <input type="password" name="password" autofocus spellcheck="false" />
          <span class="cursor"></span>
        </div>
        <div class="btn-row">
          <button type="submit">[ AUTHENTICATE ]</button>
        </div>
      </form>

      <p class="footer-text">UNAUTHORIZED ACCESS IS PROHIBITED AND MONITORED</p>
    </div>
  </body>
</html>
